# =============================================================================
# Virlen macOS Build Workflow
# =============================================================================
# Builds Virlen desktop app for macOS (.dmg) on every push/tag.
# Also runs on PRs to verify the build doesn't break.
#
# Tech stack: Tauri v2 + React 19 + Rust + pnpm
# Dependencies include quasivision (ONNX Runtime + CoreML backend)
# =============================================================================

name: Build macOS

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*" # Trigger on version tags like v0.1.0, v1.0.0
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allow manual trigger from GitHub UI

# Ensure only one build per branch/tag runs at a time
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: macos-13 # Intel Mac (macOS 13 Ventura)
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14 # Apple Silicon (macOS 14 Sonoma)
            target: aarch64-apple-darwin
      # Don't fail fast — both arch builds are independent
      fail-fast: false

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js + pnpm (with built-in caching) ────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── 3. Setup Rust ───────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── 5. Install macOS system dependencies (for Tauri) ────────────────
      # Most Tauri deps (webkit, gtk) are for Linux only.
      # On macOS, Xcode command line tools + WebKit are built-in.
      # We just make sure Rust targets are correctly set.
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Ensure Xcode command line tools are available
          xcode-select -p || xcode-select --install

      # ── 6. Install frontend dependencies ─────────────────────────────────
      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      # ── 7. Install Tauri CLI ────────────────────────────────────────────
      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --version "^2.0"

      # ── 8. Build the app ────────────────────────────────────────────────
      - name: Build Virlen for macOS (${{ matrix.arch }})
        shell: bash
        env:
          # No code signing for CI builds (no Apple Developer cert available)
          # Set these secrets in GitHub repo settings for signing:
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY
          # APPLE_TEAM_ID, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # Tauri config for CI
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm tauri build --target ${{ matrix.target }}

      # ── 9. Upload build artifacts ───────────────────────────────────────
      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: Virlen-macOS-${{ matrix.arch }}-${{ github.sha }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 14

      - name: Upload .app artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Virlen-macOS-${{ matrix.arch }}-app-${{ github.sha }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: warn
          retention-days: 7

  # ── 10. (Optional) Create Release on tag push ───────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: |
          find artifacts -type f -name "*.dmg" -o -name "*.app.zip" | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Virlen ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.zip
          fail_on_unmatched_files: false
