# =============================================================================
# Virlen Windows Build Workflow
# =============================================================================
# Builds Virlen desktop app for Windows (x86_64) via NSIS installer.
# =============================================================================

name: Build Windows

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build Windows (x86_64)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Node.js + pnpm ──────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ── 3. Setup Rust ───────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      # ── 4. Install frontend dependencies ─────────────────────────────────
      - name: Install frontend dependencies
        shell: bash
        run: pnpm install --frozen-lockfile

      # ── 5. Install Tauri CLI ────────────────────────────────────────────
      - name: Install Tauri CLI
        shell: bash
        run: cargo install tauri-cli --version "^2.0"

      # ── 6. Build the app ────────────────────────────────────────────────
      - name: Build Virlen for Windows
        shell: bash
        env:
          # Tauri config for CI
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          pnpm tauri build --target x86_64-pc-windows-msvc

      # ── 7. Upload build artifacts ───────────────────────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: Virlen-Windows-x64-${{ github.sha }}
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Upload MSI installer (if any)
        uses: actions/upload-artifact@v4
        with:
          name: Virlen-Windows-x64-msi-${{ github.sha }}
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 14

  # ── 8. (Optional) Create Release on tag push ───────────────────────────
  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        shell: bash
        run: |
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" \) | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Virlen ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
          fail_on_unmatched_files: false
